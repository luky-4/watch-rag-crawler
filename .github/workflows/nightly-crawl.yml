name: Nightly Crawl Pipeline

on:
  schedule:
    # Ogni lunedì alle 2 AM UTC
    - cron: '0 2 * * 1'
  
  # Permette lancio manuale
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Max pages per site (0 = unlimited)'
        required: false
        default: '0'

jobs:
  crawl-chunk-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 ore max
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🗄️ Download databases from Supabase Storage
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Download crawler DB
          HTTP=$(curl -s -o crawler.db.gz -w "%{http_code}" \
            "$SUPABASE_URL/storage/v1/object/crawler-dbs/crawler.db.gz" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY")
          [ "$HTTP" = "200" ] && echo "✅ crawler.db.gz scaricato" || { echo "⚠️ crawler.db.gz non trovato (HTTP $HTTP) - fresh start"; rm -f crawler.db.gz; }

          # Download chunker DB
          HTTP=$(curl -s -o chunker.db.gz -w "%{http_code}" \
            "$SUPABASE_URL/storage/v1/object/crawler-dbs/chunker.db.gz" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY")
          [ "$HTTP" = "200" ] && echo "✅ chunker.db.gz scaricato" || { echo "⚠️ chunker.db.gz non trovato (HTTP $HTTP) - fresh start"; rm -f chunker.db.gz; }

      - name: 🗄️ Setup databases
        run: |
          mkdir -p output/chunks
          
          # Decomprimi crawler DB
          if [ -f crawler.db.gz ]; then
            gunzip -c crawler.db.gz > output/crawler.db
            echo "✅ Crawler DB ready: $(ls -lh output/crawler.db | awk '{print $5}')"
          else
            echo "⚠️ No previous crawler DB - starting fresh"
          fi
          
          # Decomprimi chunker DB
          if [ -f chunker.db.gz ]; then
            gunzip -c chunker.db.gz > output/chunks/chunker.db
            echo "✅ Chunker DB ready: $(ls -lh output/chunks/chunker.db | awk '{print $5}')"
          else
            echo "⚠️ No previous chunker DB - starting fresh"
          fi

          # Reset COMPLETO timezone.com: cancella tutte le righe (non solo quelle vuote)
          # così il crawler le ri-scarica tutte al prossimo run
          if [ -f output/crawler.db ]; then
            DELETED=$(sqlite3 output/crawler.db "DELETE FROM urls WHERE url LIKE '%timezone.com%'; SELECT changes();")
            echo "🗑️ Timezone.com reset: $DELETED righe cancellate dal crawler DB"
          fi
      
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Xvfb: display virtuale richiesto da Camoufox virtual_display=True su GitHub Actions
          sudo apt-get install -y xvfb
          # Camoufox: Firefox anti-detect, bypassa meglio gli antibot di Chromium.
          # Fallback automatico a Playwright se qualcosa va storto.
          pip install camoufox
          python -m camoufox fetch
          # Playwright come fallback
          playwright install chromium
      
      - name: 🔐 Create sites.txt from secret
        run: |
          mkdir -p config
          echo "${{ secrets.SITES_LIST }}" > config/sites.txt
          SITE_COUNT=$(grep -v '^#' config/sites.txt | grep -v '^$' | wc -l)
          echo "✅ Created sites.txt with $SITE_COUNT sites"
      
      - name: 🔐 Create brand_seeds.json from secret
        env:
          BRAND_SEEDS: ${{ secrets.BRAND_SEEDS }}
        run: |
          mkdir -p config
          echo "$BRAND_SEEDS" > config/brand_seeds.json
          echo "✅ Created brand_seeds.json"
      
      - name: 🕷️ Run crawler
        env:
          CAMOUFOX_VIRTUAL_DISPLAY: "1"
        run: |
          MAX_PAGES=${{ github.event.inputs.max_pages || '0' }}
          
          python3 crawlers/rag_site_crawler.py \
            --input config/sites.txt \
            --out ./output \
            --max-pages $MAX_PAGES \
            --workers 4
        continue-on-error: true
      
      - name: 🔨 Run chunker
        if: success() || failure()
        run: |
          python3 processing/chunker.py \
            -i ./output/articles \
            -o ./output/chunks \
            --chunk-size 300
        continue-on-error: true

      - name: 🏛️ Run auction crawler
        if: success() || failure()
        env:
          MAX_AUCTION_LOTS: ${{ vars.MAX_AUCTION_LOTS || '200' }}
          AUCTION_SITES: ${{ secrets.AUCTION_SITES }}
        run: |
          mkdir -p output/auctions
          # Scarica DB aste precedente se esiste
          HTTP=$(curl -s -o output/auctions/auction_crawler.db.gz -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/crawler-dbs/auction_crawler.db.gz" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}")
          if [ "$HTTP" = "200" ]; then
            gunzip -f output/auctions/auction_crawler.db.gz
            echo "✅ auction_crawler.db scaricato"
          else
            echo "⚠️ auction_crawler.db non trovato (HTTP $HTTP) - fresh start"
          fi
          python3 crawlers/auction_crawler.py --out ./output/auctions
        continue-on-error: true

      - name: 🔨 Run chunker auction
        if: success() || failure()
        run: |
          JSONL_COUNT=$(find output/auctions -name "*.jsonl" 2>/dev/null | wc -l)
          if [ "$JSONL_COUNT" -gt 0 ]; then
            echo "✅ Trovati $JSONL_COUNT file JSONL aste → chunking"
            python3 processing/chunker.py \
              -i ./output/auctions \
              -o ./output/chunks \
              --chunk-size 300
          else
            echo "⚠️ Nessun file JSONL aste trovato, skip chunker"
          fi
        continue-on-error: true
      
      - name: 📤 Upload to Supabase
        if: success() || failure()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 processing/upload_supabase.py \
            -i ./output/chunks \
            --batch-size 100
      
      - name: 🗄️ Compress and upload databases to Supabase Storage
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Comprimi crawler DB
          if [ -f output/crawler.db ]; then
            gzip -f output/crawler.db
            mv output/crawler.db.gz crawler.db.gz
            echo "✅ Crawler DB compressed: $(ls -lh crawler.db.gz | awk '{print $5}')"
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "$SUPABASE_URL/storage/v1/object/crawler-dbs/crawler.db.gz" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: application/octet-stream" \
              -H "x-upsert: true" \
              --data-binary @crawler.db.gz)
            [ "$HTTP" = "200" ] && echo "✅ crawler.db.gz uploadato su Supabase" || echo "❌ Upload crawler fallito (HTTP $HTTP)"
          fi
          
          # Comprimi chunker DB
          if [ -f output/chunks/chunker.db ]; then
            gzip -f output/chunks/chunker.db
            mv output/chunks/chunker.db.gz chunker.db.gz
            echo "✅ Chunker DB compressed: $(ls -lh chunker.db.gz | awk '{print $5}')"
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "$SUPABASE_URL/storage/v1/object/crawler-dbs/chunker.db.gz" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: application/octet-stream" \
              -H "x-upsert: true" \
              --data-binary @chunker.db.gz)
            [ "$HTTP" = "200" ] && echo "✅ chunker.db.gz uploadato su Supabase" || echo "❌ Upload chunker fallito (HTTP $HTTP)"
          fi

          # Comprimi auction DB
          if [ -f output/auctions/auction_crawler.db ]; then
            gzip -f output/auctions/auction_crawler.db
            echo "✅ Auction DB compressed: $(ls -lh output/auctions/auction_crawler.db.gz | awk '{print $5}')"
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "$SUPABASE_URL/storage/v1/object/crawler-dbs/auction_crawler.db.gz" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: application/octet-stream" \
              -H "x-upsert: true" \
              --data-binary @output/auctions/auction_crawler.db.gz)
            [ "$HTTP" = "200" ] && echo "✅ auction_crawler.db.gz uploadato su Supabase" || echo "❌ Upload auction DB fallito (HTTP $HTTP)"
          fi

      - name: 📊 Generate summary
        if: always()
        run: |
          echo "## 📊 Crawl Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # DB Stats
          if [ -f crawler.db.gz ]; then
            CRAWLER_SIZE=$(ls -lh crawler.db.gz | awk '{print $5}')
            echo "- **Crawler DB**: $CRAWLER_SIZE → Supabase Storage" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f chunker.db.gz ]; then
            CHUNKER_SIZE=$(ls -lh chunker.db.gz | awk '{print $5}')
            echo "- **Chunker DB**: $CHUNKER_SIZE → Supabase Storage" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Articles
          if [ -d output/articles ]; then
            ARTICLES=$(find output/articles -name "*.jsonl" 2>/dev/null | wc -l)
            echo "- **Articles files**: $ARTICLES" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Chunks
          if [ -d output/chunks ]; then
            CHUNKS=$(find output/chunks -name "*.jsonl" 2>/dev/null | wc -l)
            echo "- **Chunk files**: $CHUNKS" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Pipeline completed at $(date -u)" >> $GITHUB_STEP_SUMMARY
      
      - name: 📁 Upload logs to Supabase Storage
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          RUN_DIR="run-${{ github.run_number }}"
          if [ -d output/logs ] && [ "$(ls -A output/logs)" ]; then
            cd output/logs
            for f in *; do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                "$SUPABASE_URL/storage/v1/object/crawler-dbs/logs/$RUN_DIR/$f" \
                -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
                -H "Content-Type: text/plain" \
                -H "x-upsert: true" \
                --data-binary @"$f")
              [ "$HTTP" = "200" ] && echo "✅ $f" || echo "❌ $f (HTTP $HTTP)"
            done
            cd -
          else
            echo "⚠️ Nessun log trovato"
          fi
      
