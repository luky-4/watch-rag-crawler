name: Nightly Crawl Pipeline

on:
  schedule:
    # Ogni giorno alle 2 AM UTC
    - cron: '0 2 * * *'
  
  # Permette lancio manuale
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Max pages per site (0 = unlimited)'
        required: false
        default: '0'

jobs:
  crawl-chunk-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 ore max
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🗄️ Download crawler DB
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          name: crawler-db
          path: ./
          workflow: nightly-crawl.yml
          if_no_artifact_found: warn
      
      - name: 🗄️ Download chunker DB
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          name: chunker-db
          path: ./
          workflow: nightly-crawl.yml
          if_no_artifact_found: warn
      
      - name: 🗄️ Setup databases
        run: |
          mkdir -p output/chunks
          
          # Decomprimi crawler DB
          if [ -f crawler.db.gz ]; then
            gunzip -c crawler.db.gz > output/crawler.db
            echo "✅ Crawler DB ready: $(ls -lh output/crawler.db | awk '{print $5}')"
          else
            echo "⚠️ No previous crawler DB - starting fresh"
          fi
          
          # Decomprimi chunker DB
          if [ -f chunker.db.gz ]; then
            gunzip -c chunker.db.gz > output/chunks/chunker.db
            echo "✅ Chunker DB ready: $(ls -lh output/chunks/chunker.db | awk '{print $5}')"
          else
            echo "⚠️ No previous chunker DB - starting fresh"
          fi
      
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Camoufox: Firefox anti-detect, bypassa meglio gli antibot di Chromium.
          # Fallback automatico a Playwright se qualcosa va storto.
          pip install camoufox
          python -m camoufox fetch --browser firefox
          # Playwright come fallback
          playwright install chromium
      
      - name: 🔐 Create sites.txt from secret
        run: |
          mkdir -p config
          echo "${{ secrets.SITES_LIST }}" > config/sites.txt
          SITE_COUNT=$(grep -v '^#' config/sites.txt | grep -v '^$' | wc -l)
          echo "✅ Created sites.txt with $SITE_COUNT sites"
      
      - name: 🔐 Create brand_seeds.json from secret
        run: |
          mkdir -p config
          echo "${{ secrets.BRAND_SEEDS }}" > config/brand_seeds.json
          echo "✅ Created brand_seeds.json"
      
      - name: 🕷️ Run crawler
        run: |
          MAX_PAGES=${{ github.event.inputs.max_pages || '0' }}
          
          python3 crawlers/rag_site_crawler.py \
            --input config/sites.txt \
            --out ./output \
            --max-pages $MAX_PAGES \
            --workers 4
        continue-on-error: true
      
      - name: 🔨 Run chunker
        if: success() || failure()
        run: |
          python3 processing/chunker.py \
            -i ./output/articles \
            -o ./output/chunks \
            --chunk-size 300
        continue-on-error: true
      
      - name: 📤 Upload to Supabase
        if: success() || failure()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 processing/upload_supabase.py \
            -i ./output/chunks \
            --batch-size 100
      
      - name: 🗄️ Compress databases
        if: always()
        run: |
          # Comprimi crawler DB
          if [ -f output/crawler.db ]; then
            gzip -f output/crawler.db
            mv output/crawler.db.gz crawler.db.gz
            echo "✅ Crawler DB compressed: $(ls -lh crawler.db.gz | awk '{print $5}')"
          fi
          
          # Comprimi chunker DB
          if [ -f output/chunks/chunker.db ]; then
            gzip -f output/chunks/chunker.db
            mv output/chunks/chunker.db.gz chunker.db.gz
            echo "✅ Chunker DB compressed: $(ls -lh chunker.db.gz | awk '{print $5}')"
          fi
      
      - name: 🗄️ Upload crawler DB
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crawler-db
          path: crawler.db.gz
          retention-days: 90
          if-no-files-found: warn
      
      - name: 🗄️ Upload chunker DB
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chunker-db
          path: chunker.db.gz
          retention-days: 90
          if-no-files-found: warn
      
      - name: 📊 Generate summary
        if: always()
        run: |
          echo "## 📊 Crawl Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # DB Stats
          if [ -f crawler.db.gz ]; then
            CRAWLER_SIZE=$(ls -lh crawler.db.gz | awk '{print $5}')
            echo "- **Crawler DB**: $CRAWLER_SIZE (compressed)" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f chunker.db.gz ]; then
            CHUNKER_SIZE=$(ls -lh chunker.db.gz | awk '{print $5}')
            echo "- **Chunker DB**: $CHUNKER_SIZE (compressed)" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Articles
          if [ -d output/articles ]; then
            ARTICLES=$(find output/articles -name "*.jsonl" 2>/dev/null | wc -l)
            echo "- **Articles files**: $ARTICLES" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Chunks
          if [ -d output/chunks ]; then
            CHUNKS=$(find output/chunks -name "*.jsonl" 2>/dev/null | wc -l)
            echo "- **Chunk files**: $CHUNKS" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Pipeline completed at $(date -u)" >> $GITHUB_STEP_SUMMARY
      
      - name: 📁 Upload artifacts (logs)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crawl-logs-${{ github.run_number }}
          path: output/logs/
          retention-days: 30
          if-no-files-found: ignore
      
      - name: 📁 Upload sample output (debug)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: debug-output-${{ github.run_number }}
          path: |
            output/articles/*.jsonl
            output/chunks/*.jsonl
          retention-days: 7
          if-no-files-found: ignore
      
      - name: 🚨 Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Nightly crawl failed',
              body: `Workflow run failed: ${runUrl}\n\nCheck the logs for details.`,
              labels: ['automation', 'bug']
            });
